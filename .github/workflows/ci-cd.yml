name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: flake8
        run: flake8 src api tests
      - name: black --check
        run: black --check src api tests
      - name: isort --check
        run: isort --check-only src api tests

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .
      - name: Run pytest with coverage
        run: pytest --cov=src/heart_mlops --cov=api --cov-report=xml --cov-report=term
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Train and log to MLflow
        run: python -m heart_mlops.train
      - name: Upload model + metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/model.joblib
            models/metrics.json
            reports/figures/
      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4
      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
      - name: Build Docker image
        run: docker build -t heart-disease-api:ci .
      - name: Smoke test container
        run: |
          docker run -d --name heart-api -p 8000:8000 heart-disease-api:ci
          sleep 15
          curl --fail http://localhost:8000/health
          docker rm -f heart-api
